version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
      npm-security:
        applies-to: security-updates
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    labels:
      - type:chore
      - area:security

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
    labels:
      - type:chore
      - area:security
