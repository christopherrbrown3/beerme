<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BeerMe</title>
  </head>
  <body>
    <script>
      const redirectPath = location.pathname + location.search + location.hash;

      try {
        sessionStorage.setItem('beerme:redirect', redirectPath);
        location.replace('/');
      } catch {
        location.replace('/?redirect=' + encodeURIComponent(redirectPath));
      }
    </script>
  </body>
</html>
